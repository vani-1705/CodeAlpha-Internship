<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Image Gallery — Beautiful Moments</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- External CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

   <!-- NAVBAR -->
    <nav class="navbar">
    <div class="nav-logo">Image<span>Gallery</span></div>
    <div class="nav-right">
    
   <!-- Search Bar -->
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search images...">
      <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/>
      <path d="m21 21-4.35-4.35"/>
      </svg>
    </div>
    
   <!-- Dark/Light Toggle -->
      <button class="theme-toggle" id="themeToggle" title="Toggle theme">
      <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height=20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
       <circle cx="12" cy="12" r="5"/>
       <line x1="12" y1="1" x2="12" y2="3"/>
       <line x1="12" y1="21" x2="12" y2="23"/>
       <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
       <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
       <line x1="1" y1="12" x2="3" y2="12"/>
       <line x1="21" y1="12" x2="23" y2="12"/>
       <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
       <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      </button>
    </div>
  </nav>

  <!-- HERO HEADER -->
  <header>
    <div class="header-bg"></div>
    <div class="header-content">
      <h1>Beautiful Moments</h1>
      <p>Explore the world of arts, nature, people &amp; more</p>
    </div>
  </header>

  <!-- CONTROLS: Categories + Filters -->
  <div class="controls">

    <!-- Category Buttons -->
    <div class="categories" id="categories">
      <button class="cat-btn active" data-cat="all">
        <span class="cat-icon">⊞</span> All
      </button>
      <button class="cat-btn" data-cat="arts">
        <span class="cat-icon">🎨</span> Arts
      </button>
      <button class="cat-btn" data-cat="animals">
        <span class="cat-icon">🐾</span> Animals
      </button>
      <button class="cat-btn" data-cat="birds">
        <span class="cat-icon">🦋</span> Birds
      </button>
      <button class="cat-btn" data-cat="cartoons">
        <span class="cat-icon">🎭</span> Cartoons
      </button>
      <button class="cat-btn" data-cat="children">
        <span class="cat-icon">👶</span> Children
      </button>
      <button class="cat-btn" data-cat="food">
        <span class="cat-icon">🍽</span> Food
      </button>
      <button class="cat-btn" data-cat="houses">
        <span class="cat-icon">🏡</span> Houses
      </button>
      <button class="cat-btn" data-cat="nature">
        <span class="cat-icon">🌿</span> Nature
      </button>
      <button class="cat-btn" data-cat="people">
        <span class="cat-icon">👤</span> People
      </button>
      <button class="cat-btn" data-cat="temples">
        <span class="cat-icon">🛕</span> Temples
      </button>
    </div>

    <!-- Divider -->
    <div class="controls-divider"></div>

    <!-- Image Filter Buttons -->
    <div class="filter-row">
      <span class="filters-label">Filters</span>
      <div class="filters" id="galleryFilters">
        <button class="filter-btn active" data-filter="none">Original</button>
        <button class="filter-btn" data-filter="f-bw">B&amp;W</button>
        <button class="filter-btn" data-filter="f-warm">Warm</button>
        <button class="filter-btn" data-filter="f-cool">Cool</button>
        <button class="filter-btn" data-filter="f-vivid">Vivid</button>
        <button class="filter-btn" data-filter="f-fade">Fade</button>
        <button class="filter-btn" data-filter="f-dramatic">Dramatic</button>
      </div>
    </div>

  </div>

  <!-- Image Count -->
  <div class="gallery-meta" id="galleryMeta">
    <span id="galleryCount">0 photos</span>
  </div>

  <!-- GALLERY GRID (Images are injected by JS) -->
  <div class="gallery" id="gallery"></div>

  <!-- Load More Button -->
  <div class="load-more-wrap">
    <button class="load-more-btn" id="loadMoreBtn">
      Load More
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12a9 9 0 11-6.219-8.56"/>
      </svg>
    </button>
  </div>

  <!-- LIGHTBOX (Popup) -->
   <div class="lightbox" id="lightbox">
 
  <!-- Dark backdrop — click to close -->
   <div class="lb-backdrop" id="lbBackdrop"></div>
  
  <!-- Lightbox content box -->
   <div class="lb-box">

  <!-- Main image area -->
   <div class="lb-img-wrap">
   <img id="lbImg" src="" alt="">

  <!-- Close button -->
    <button class="lb-close" id="lbClose">✕</button>
 
  <!-- Prev / Next arrows -->
    <button class="lb-nav lb-prev" id="lbPrev">&#8592;</button>
    <button class="lb-nav lb-next" id="lbNext">&#8594;</button>

  <!-- Image title overlay -->
     <div class="lb-title-overlay" id="lbTitleOverlay"></div>
   
    </div>

  <!-- Counter: "3 / 12 — Title" -->
    <div class="lb-counter" id="lbCounter"></div>
 
  <!-- Filter strip inside lightbox -->
    <div class="lb-filters">
     <span class="lb-filters-label">Filters</span>
     <button class="lb-filter-btn active" data-lbfilter="none">Original</button>
     <button class="lb-filter-btn" data-lbfilter="f-bw">B&amp;W</button>
     <button class="lb-filter-btn" data-lbfilter="f-warm">Warm</button>
     <button class="lb-filter-btn" data-lbfilter="f-cool">Cool</button>
     <button class="lb-filter-btn" data-lbfilter="f-vivid">Vivid</button>
     <button class="lb-filter-btn" data-lbfilter="f-fade">Fade</button>
     <button class="lb-filter-btn" data-lbfilter="f-dramatic">Dramatic</button>
    </div>

  <!-- Thumbnail strip -->
    <div class="lb-thumbs" id="lbThumbs"></div>

    </div><!-- /.lb-box -->
  </div><!-- /.lightbox -->

  <!-- External JavaScript -->
  <script src="image-script.js"></script>

</body>
</html>
